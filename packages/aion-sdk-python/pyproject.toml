[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aion-sdk-python"
version = "0.1.0"
description = "Python SDK and aionctl CLI for the AION Brain public API"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
dependencies = [
  "httpx>=0.27.0,<1.0.0",
  "pydantic>=2.7.0,<3.0.0",
  "rich>=13.7.0,<14.0.0",
  "typer>=0.12.0,<1.0.0",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.10.0,<2.0.0",
  "pytest>=8.2.0,<9.0.0",
  "ruff>=0.5.0,<1.0.0",
]

[project.scripts]
aionctl = "aion_sdk.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/aion_sdk"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
packages = ["aion_sdk"]
strict = true
disallow_untyped_decorators = false


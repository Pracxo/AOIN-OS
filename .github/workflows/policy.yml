name: AION Policy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Brain API
        run: python -m pip install -e "services/brain-api[dev]"
      - name: Policy catalog tests
        working-directory: services/brain-api
        run: pytest tests/test_policy_catalog_contracts.py tests/test_policy_catalog_repository.py tests/test_policy_catalog_services.py tests/test_policy_catalog_api.py
      - name: Policy coverage script
        run: scripts/policy-coverage.sh
      - name: No domain drift
        run: scripts/verify-no-domain-drift.sh
